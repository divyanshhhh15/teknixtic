{% load static %}
<div class="container py-5">
  <div class="card border-0 shadow rounded-4 bg-dark text-light">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="h3 mb-1">{{ session.title }}</h2>
          <p class="text-white-50 mb-0">Saved chat history</p>
        </div>
        <a class="btn btn-outline-light" href="/">Back to home</a>
      </div>

      {% for message in messages %}
        <div class="card border-secondary-subtle bg-black bg-opacity-25 rounded-4 mb-3">
          <div class="card-body">
            <div class="text-uppercase small text-info mb-2">{{ message.role }}</div>
            <p class="mb-0 text-light">{{ message.content }}</p>
          </div>
        </div>
      {% empty %}
        <p class="text-white-50 mb-0">No messages in this chat yet.</p>
      {% endfor %}
    </div>
  </div>
</div>
